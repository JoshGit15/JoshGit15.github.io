<!DOCTYPE html>
<html lang="en">
<head>
    <title>Josh Resume - Contact</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="/Favicon.png">
    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
</head>

<body>

<!-- TOP BUTTON -->
<button onclick="topFunction()" id="myBtn" title="Go to top">Top</button>

<!-- NAVIGATION -->
<div id="navigationBar">

    <div>
        <h1 class="header1"><a href="index.html">Joshua Halpin CV</a></h1>
    </div>

    <div id="icon">
        <div class="menu-icon" onclick="toggleMenu(this)">
            <div class="bar1"></div>
            <div class="bar2"></div>
            <div class="bar3"></div>
        </div>
    </div>

    <div id="myNav" class="overlay">
        <div class="overlay-content">
            <a href="index.html#summary">Summary</a>
            <a href="index.html#personalQualities">Personal Qualities</a>
            <a href="index.html#currentEducation">Current Education</a>
            <a href="index.html#portfolio">3D Modelling</a>
            <a href="index.html#personalAchivements">Personal Achievements</a>

            <div class="menu-item">
                <a href="contact.html">Contact Me</a>
                <a href="javascript:void(0)" id="themeBtn">Dark Mode</a>
            </div>
        </div>
    </div>
</div>

<!-- CONTACT FORM -->
<div class="container">

    <form name="contactForm">

        <label>First and last name</label>
        <input type="text" name="fname" placeholder="Your name..">

        <label>Contact Number</label>
        <input type="text" name="number" placeholder="Your phone number..">

        <label>Subject</label>
        <textarea name="subject" placeholder="Tell me about yourself.." style="height:200px"></textarea>

        <p id="message"></p>

        <button type="button" onclick="validateForm()">Submit</button>

    </form>

</div>

<!-- FOOTER -->
<footer>
    <p>Joshua Halpin</p>
    <p>Jdmh.joshua@gmail.com</p>
</footer>

<!-- JAVASCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ================= NAV MENU ================= */
  const nav = document.getElementById("myNav");
  const menuIcon = document.querySelector(".menu-icon");

  window.toggleMenu = function (icon) {
    icon.classList.toggle("change");
    nav.classList.toggle("open");
  };

  document.querySelectorAll(".overlay-content a").forEach(link => {
    link.addEventListener("click", () => {
      nav.classList.remove("open");
      menuIcon.classList.remove("change");
    });
  });

  nav.addEventListener("click", (e) => {
    if (e.target === nav) {
      nav.classList.remove("open");
      menuIcon.classList.remove("change");
    }
  });


  /* ================= DARK MODE ================= */
  const themeBtn = document.getElementById("themeBtn");

  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
    if (themeBtn) themeBtn.textContent = "Light Mode";
  }

  if (themeBtn) {
    themeBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");

      if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
        themeBtn.textContent = "Light Mode";
      } else {
        localStorage.setItem("theme", "light");
        themeBtn.textContent = "Dark Mode";
      }
    });
  }


  /* ================= FORM VALIDATION ================= */
  window.validateForm = function () {
    const name = document.forms["contactForm"]["fname"].value;
    const message = document.getElementById("message");

    if (!name) {
      message.textContent = "Name is required";
      message.style.color = "red";
      return;
    }

    message.textContent = "Message ready to send!";
    message.style.color = "green";
  };


  /* ================= TOP BUTTON ================= */
  const myBtn = document.getElementById("myBtn");

  window.onscroll = function () {
    if (document.documentElement.scrollTop > 300) {
      myBtn.style.display = "block";
    } else {
      myBtn.style.display = "none";
    }
  };

  window.topFunction = function () {
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

});
</script>

</body>
</html>
